<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Spill Produk</title>

  <style>

    body{
      background:#f6f3ef;
      font-family:Arial;
      padding:20px;
      color:#222;
    }

    .judul{
      margin-bottom:40px;
    }

    .judul h1{
      font-size:38px;
      margin-bottom:10px;
    }

    .judul p{
      color:#666;
      font-size:16px;
    }

    .produk-list{
      display:flex;
      flex-direction:column;
      gap:30px;
    }

    .card{
      background:white;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .gambar{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .content{
      padding:20px;
    }

    .nomor{
      font-size:14px;
      color:#888;
      margin-bottom:10px;
    }

    .nama{
      font-size:28px;
      margin-bottom:15px;
      font-weight:bold;
    }

    .deskripsi{
      color:#666;
      line-height:1.5;
      margin-bottom:20px;
    }

    .btn{
      background:#111;
      color:white;
      text-decoration:none;
      padding:13px 20px;
      border-radius:50px;
      display:inline-block;
    }

  </style>
</head>

<body>

  <div class="judul">

    <h1>
      Spill Produk Aesthetic ✨
    </h1>

    <p>
      Produk random yang sering ditanya orang 💖
    </p>

  </div>


  <!-- TEMPAT PRODUK -->
  <div class="produk-list" id="produkList"></div>



  <script>

    // =========================
    // DATA PRODUK
    // =========================

    const produk = [

     {
        nomor:1,
        nama: "Bantal karakter",
        deskripsi: "UMECO-bantal karakter anime plushie jujutsu kaisen",
        gambar: "https://drive.google.com/file/d/1foObB4eK9lVfHQ2RsIvzyYn9vXFFUqf1/view?usp=drivesdk",
        link: "https://s.shopee.co.id/902BI4wq5A"
      },
     
      {
        nomor: 100,
        nama: "Kolor Pendek",
        deskripsi: "Kolor nyaman dipake harian.",
        gambar: "kolor.png",
        link: "https://s.shopee.co.id/3qJPV5RcfY"
      },

      {
        nomor: 99 ,
        nama: "ANIME KAOS",
        deskripsi: "KIZARU kaos ANIME ZORO NOTHING HAPPENED",
        gambar: "zoro.png",
        link: "https://s.shopee.co.id/6VKqJ9HWKA"
      },

      {
        nomor: 98,
        nama: "t-shirt korean style",
        deskripsi: "Lampu aesthetic buat kamar.",
        gambar:"kaos korea.png",
        link: "https://s.shopee.co.id/AKXYriPhX7"
      },

      {
        nomor:97,
        nama: "kaos T-shirt pria wanita loose",
        deskripsi: "Meja setup minimalis gaming.",
        gambar: "kaos.Png",
        link: "https://s.shopee.co.id/30ky89BdpA"
      },

    ];



    // =========================
    // LOOP PRODUK
    // =========================

    const produkList = document.getElementById("produkList");


    produk.forEach((item) => {

      produkList.innerHTML += `

      <div class="card">

        <img src="${item.gambar}" class="gambar">

        <div class="content">

          <div class="nomor">
            #${item.nomor}
          </div>

          <div class="nama">
            ${item.nama}
          </div>

          <div class="deskripsi">
            ${item.deskripsi}
          </div>

          <a href="${item.link}" class="btn">
            Lihat Produk
          </a>

        </div>

      </div>

      `;

    });

  </script>

</body>
</html>
